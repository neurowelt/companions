name: Tag on version bump

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - 'scripts/**'
      - '.github/**'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Tag when a bump commit was pushed
        run: |
          set -euo pipefail

          # A manual bump (scripts/bump-version.sh) leaves a commit whose subject
          # starts with "bump". Anything else is a normal push we must not tag.
          HEAD_MSG="$(git log -1 --format=%s HEAD)"
          if ! printf '%s' "$HEAD_MSG" | grep -qE '^bump'; then
            echo "HEAD is not a bump commit; nothing to tag: $HEAD_MSG"
            exit 0
          fi

          VERSION="$(jq -r '.version // empty' plugins/companions/.claude-plugin/plugin.json)"
          [ -n "$VERSION" ] || { echo "error: could not read version" >&2; exit 1; }
          TAG="v${VERSION}"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "tag ${TAG} already exists; nothing to do"
            exit 0
          fi

          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
          echo "tagged ${TAG}"
